name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    # Requires the preview deployment URL passed in from a Vercel deploy hook or workflow
    if: vars.E2E_BASE_URL != ''
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          # Point at the Vercel preview URL for this PR (isolated test DB, not production)
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
